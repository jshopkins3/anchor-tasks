<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anchor Tasks</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #09090b;
      color: #e4e4e7;
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    /* ── Top bar ─────────────────────────────────────────────────── */
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 24px;
      background: #18181b;
      border-bottom: 1px solid #27272a;
      position: sticky; top: 0; z-index: 50;
    }
    .topbar-left { display: flex; align-items: center; gap: 12px; }
    .topbar-logo {
      width: 32px; height: 32px; border-radius: 8px;
      background: linear-gradient(135deg, #3b82f6, #1d4ed8);
      display: flex; align-items: center; justify-content: center;
    }
    .topbar-logo svg { width: 18px; height: 18px; fill: none; stroke: #fff; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .topbar h1 { font-size: 16px; font-weight: 700; color: #fff; letter-spacing: -0.01em; }
    .topbar-right { display: flex; align-items: center; gap: 12px; }
    .user-pill {
      display: flex; align-items: center; gap: 8px;
      background: #27272a; border-radius: 20px; padding: 4px 12px 4px 4px;
      font-size: 13px; color: #a1a1aa;
    }
    .user-pill img { width: 24px; height: 24px; border-radius: 50%; }
    .btn-logout {
      background: none; border: 1px solid #3f3f46; color: #a1a1aa;
      border-radius: 8px; padding: 6px 12px; font-size: 12px; cursor: pointer;
      font-family: inherit;
    }
    .btn-logout:hover { border-color: #52525b; color: #e4e4e7; }

    /* ── Tabs ─────────────────────────────────────────────────────── */
    .tabs {
      display: flex; gap: 0; padding: 0 24px;
      background: #18181b; border-bottom: 1px solid #27272a;
    }
    .tab {
      padding: 10px 20px; font-size: 13px; font-weight: 600; color: #71717a;
      cursor: pointer; border-bottom: 2px solid transparent;
      transition: all .15s;
    }
    .tab:hover { color: #a1a1aa; }
    .tab.active { color: #3b82f6; border-bottom-color: #3b82f6; }

    /* ── Main layout ─────────────────────────────────────────────── */
    .main { padding: 24px; max-width: 1100px; margin: 0 auto; }
    .section { display: none; }
    .section.active { display: block; }

    /* ── Cards ────────────────────────────────────────────────────── */
    .card {
      background: #18181b; border: 1px solid #27272a; border-radius: 12px;
      padding: 20px; margin-bottom: 16px;
    }
    .card-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .card-header h2 { font-size: 15px; font-weight: 600; color: #fff; }
    .badge {
      background: #27272a; color: #a1a1aa; font-size: 11px; font-weight: 600;
      padding: 2px 8px; border-radius: 10px;
    }

    /* ── Add form ─────────────────────────────────────────────────── */
    .add-row {
      display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap;
    }
    .add-row input, .add-row select {
      background: #27272a; border: 1px solid #3f3f46; color: #e4e4e7;
      border-radius: 8px; padding: 8px 12px; font-size: 13px;
      font-family: inherit; outline: none;
    }
    .add-row input:focus, .add-row select:focus { border-color: #3b82f6; }
    .add-row input::placeholder { color: #52525b; }
    .add-row .inp-title { flex: 1; min-width: 200px; }
    .add-row .inp-sm { width: 120px; }
    .btn-add {
      background: #3b82f6; color: #fff; border: none; border-radius: 8px;
      padding: 8px 16px; font-size: 13px; font-weight: 600; cursor: pointer;
      font-family: inherit;
    }
    .btn-add:hover { background: #2563eb; }

    /* ── Task list ────────────────────────────────────────────────── */
    .task-list { list-style: none; }
    .task-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 12px; border-radius: 8px;
      transition: background .1s;
    }
    .task-item:hover { background: #1f1f23; }
    .task-item + .task-item { border-top: 1px solid #1f1f23; }

    .task-check {
      width: 18px; height: 18px; border-radius: 4px;
      border: 2px solid #3f3f46; background: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: all .15s;
    }
    .task-check:hover { border-color: #3b82f6; }
    .task-check.done { background: #3b82f6; border-color: #3b82f6; }
    .task-check.done::after { content: "\2713"; color: #fff; font-size: 12px; font-weight: 700; }

    .task-body { flex: 1; min-width: 0; }
    .task-title { font-size: 14px; color: #e4e4e7; }
    .task-title.done { text-decoration: line-through; color: #52525b; }
    .task-meta { display: flex; gap: 8px; margin-top: 2px; flex-wrap: wrap; }
    .task-tag {
      font-size: 11px; padding: 1px 6px; border-radius: 4px;
      background: #27272a; color: #71717a;
    }
    .task-tag.pri-high { background: rgba(245, 158, 11, .15); color: #fbbf24; }
    .task-tag.pri-urgent { background: rgba(239, 68, 68, .15); color: #f87171; }
    .task-tag.pri-low { color: #52525b; }
    .task-tag.due { background: rgba(59,130,246,.1); color: #60a5fa; }
    .task-tag.project-tag { background: rgba(139,92,246,.1); color: #a78bfa; }

    .task-delete {
      background: none; border: none; color: #3f3f46; cursor: pointer;
      font-size: 16px; padding: 4px; border-radius: 4px; flex-shrink: 0;
    }
    .task-delete:hover { color: #ef4444; background: rgba(239,68,68,.1); }
    .task-edit {
      background: none; border: none; color: #3f3f46; cursor: pointer;
      font-size: 13px; padding: 4px 6px; border-radius: 4px; flex-shrink: 0;
    }
    .task-edit:hover { color: #3b82f6; background: rgba(59,130,246,.1); }

    /* ── Edit drawer (inline expand) ─────────────────────────────── */
    .edit-drawer {
      background: #1f1f23; border: 1px solid #27272a; border-radius: 10px;
      padding: 16px; margin: 4px 0 8px 30px;
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
      animation: slideDown .15s ease-out;
    }
    @keyframes slideDown {
      from { opacity: 0; max-height: 0; }
      to { opacity: 1; max-height: 300px; }
    }
    .edit-drawer label {
      font-size: 11px; color: #71717a; text-transform: uppercase;
      letter-spacing: 0.04em; display: block; margin-bottom: 3px;
    }
    .edit-drawer input, .edit-drawer select {
      background: #27272a; border: 1px solid #3f3f46; color: #e4e4e7;
      border-radius: 6px; padding: 6px 10px; font-size: 13px;
      font-family: inherit; outline: none; width: 100%;
    }
    .edit-drawer input:focus, .edit-drawer select:focus { border-color: #3b82f6; }
    .edit-drawer .full { grid-column: 1 / -1; }
    .edit-actions {
      grid-column: 1 / -1; display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px;
    }
    .btn-save {
      background: #3b82f6; color: #fff; border: none; border-radius: 6px;
      padding: 6px 14px; font-size: 12px; font-weight: 600; cursor: pointer;
      font-family: inherit;
    }
    .btn-save:hover { background: #2563eb; }
    .btn-cancel {
      background: #27272a; color: #a1a1aa; border: 1px solid #3f3f46;
      border-radius: 6px; padding: 6px 14px; font-size: 12px; cursor: pointer;
      font-family: inherit;
    }
    .btn-cancel:hover { color: #e4e4e7; border-color: #52525b; }
    .task-tag.assignee-tag { background: rgba(34,197,94,.1); color: #4ade80; }

    /* ── Project list ────────────────────────────────────────────── */
    .project-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px; border-radius: 8px;
    }
    .project-item:hover { background: #1f1f23; }
    .project-item + .project-item { border-top: 1px solid #1f1f23; }
    .project-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #3b82f6; flex-shrink: 0;
    }
    .project-dot.archived { background: #3f3f46; }
    .project-body { flex: 1; min-width: 0; }
    .project-name { font-size: 14px; color: #e4e4e7; font-weight: 600; }
    .project-name.archived { color: #52525b; text-decoration: line-through; }
    .project-desc { font-size: 12px; color: #71717a; margin-top: 2px; }
    .project-actions { display: flex; gap: 4px; }
    .project-actions button {
      background: none; border: none; color: #3f3f46; cursor: pointer;
      font-size: 12px; padding: 4px 8px; border-radius: 4px; font-family: inherit;
    }
    .project-actions button:hover { color: #a1a1aa; background: #27272a; }

    /* ── Empty state ──────────────────────────────────────────────── */
    .empty {
      text-align: center; padding: 40px 20px; color: #3f3f46; font-size: 14px;
    }

    /* ── Stats row ────────────────────────────────────────────────── */
    .stats { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    .stat-card {
      background: #18181b; border: 1px solid #27272a; border-radius: 10px;
      padding: 14px 20px; flex: 1; min-width: 120px;
    }
    .stat-label { font-size: 11px; color: #71717a; text-transform: uppercase; letter-spacing: 0.05em; }
    .stat-value { font-size: 24px; font-weight: 700; color: #fff; margin-top: 2px; }

    /* ── Filter row ───────────────────────────────────────────────── */
    .filters {
      display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap;
    }
    .filter-btn {
      background: #27272a; border: 1px solid #3f3f46; color: #a1a1aa;
      border-radius: 6px; padding: 4px 10px; font-size: 12px; cursor: pointer;
      font-family: inherit;
    }
    .filter-btn:hover { border-color: #52525b; color: #e4e4e7; }
    .filter-btn.active { background: #3b82f6; border-color: #3b82f6; color: #fff; }

    /* ── Project detail view ─────────────────────────────────────── */
    .detail-back {
      display: inline-flex; align-items: center; gap: 6px;
      color: #71717a; font-size: 13px; cursor: pointer;
      background: none; border: none; font-family: inherit;
      margin-bottom: 16px; padding: 4px 0;
    }
    .detail-back:hover { color: #a1a1aa; }
    .detail-header {
      display: flex; align-items: flex-start; justify-content: space-between;
      margin-bottom: 24px; gap: 16px;
    }
    .detail-info { flex: 1; }
    .detail-title {
      font-size: 22px; font-weight: 700; color: #fff;
      letter-spacing: -0.02em; margin-bottom: 4px;
    }
    .detail-desc { font-size: 14px; color: #a1a1aa; margin-bottom: 12px; }
    .detail-owner { font-size: 12px; color: #71717a; }
    .detail-owner span { color: #a1a1aa; }
    .detail-stats-row {
      display: flex; gap: 12px; flex-wrap: wrap;
    }
    .detail-stat {
      background: #18181b; border: 1px solid #27272a; border-radius: 10px;
      padding: 12px 18px; min-width: 100px; text-align: center;
    }
    .detail-stat .stat-value { font-size: 20px; }

    .detail-progress-bar {
      background: #27272a; border-radius: 6px; height: 8px;
      margin: 16px 0 24px; overflow: hidden;
    }
    .detail-progress-fill {
      background: linear-gradient(90deg, #3b82f6, #60a5fa);
      height: 100%; border-radius: 6px; transition: width .3s ease;
    }

    .detail-section-label {
      font-size: 13px; font-weight: 600; color: #71717a;
      text-transform: uppercase; letter-spacing: 0.05em;
      margin-bottom: 12px;
    }

    .project-card-link {
      cursor: pointer;
    }

    /* ── Kanban Board ──────────────────────────────────────────── */
    .board-toolbar {
      display: flex; align-items: center; gap: 12px; margin-bottom: 20px;
    }
    .board-toolbar select {
      background: #27272a; border: 1px solid #3f3f46; color: #e4e4e7;
      border-radius: 8px; padding: 8px 12px; font-size: 13px;
      font-family: inherit; outline: none;
    }
    .board-toolbar select:focus { border-color: #3b82f6; }
    .board-toolbar label { font-size: 13px; color: #71717a; }

    .board {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 16px;
      align-items: start;
    }
    .board-column {
      background: #111113;
      border: 1px solid #27272a;
      border-radius: 12px;
      padding: 16px;
      min-height: 200px;
    }
    .board-column-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px; padding-bottom: 10px;
      border-bottom: 1px solid #27272a;
    }
    .board-column-title {
      font-size: 13px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .board-col-todo .board-column-title { color: #a1a1aa; }
    .board-col-inprogress .board-column-title { color: #60a5fa; }
    .board-col-done .board-column-title { color: #4ade80; }
    .board-column-count {
      font-size: 11px; font-weight: 600; background: #27272a;
      color: #a1a1aa; padding: 2px 8px; border-radius: 10px;
    }

    .board-swimlane {
      margin-bottom: 12px;
    }
    .board-swimlane-title {
      font-size: 11px; font-weight: 600; color: #a78bfa;
      text-transform: uppercase; letter-spacing: 0.04em;
      margin-bottom: 6px; padding: 2px 0;
    }

    .board-card {
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 8px;
      cursor: grab;
      transition: border-color .15s, box-shadow .15s, opacity .15s;
    }
    .board-card:active { cursor: grabbing; }
    .board-card:hover { border-color: #3f3f46; }
    .board-card.dragging { opacity: 0.4; }
    .board-card.drag-over { border-color: #3b82f6; box-shadow: 0 0 0 1px #3b82f6; }

    .board-card-title {
      font-size: 13px; color: #e4e4e7; margin-bottom: 6px;
      line-height: 1.3;
    }
    .board-card-tags {
      display: flex; gap: 6px; flex-wrap: wrap;
    }
    .board-card-tag {
      font-size: 10px; padding: 1px 6px; border-radius: 4px;
      background: #27272a; color: #71717a;
    }
    .board-card-tag.pri-urgent { background: rgba(239,68,68,.15); color: #f87171; }
    .board-card-tag.pri-high { background: rgba(245,158,11,.15); color: #fbbf24; }
    .board-card-tag.pri-low { color: #52525b; }
    .board-card-tag.assignee { background: rgba(34,197,94,.1); color: #4ade80; }
    .board-card-tag.due { background: rgba(59,130,246,.1); color: #60a5fa; }

    .board-card.pri-border-urgent { border-left: 3px solid #ef4444; }
    .board-card.pri-border-high { border-left: 3px solid #f59e0b; }
    .board-card.pri-border-low { border-left: 3px solid #3f3f46; }

    .board-drop-zone {
      min-height: 40px;
      border: 2px dashed transparent;
      border-radius: 8px;
      transition: border-color .15s, background .15s;
    }
    .board-drop-zone.drag-active {
      border-color: #3b82f6;
      background: rgba(59,130,246,.05);
    }

    .board-empty {
      text-align: center; padding: 20px; color: #3f3f46; font-size: 12px;
    }
  </style>
</head>
<body>

  <!-- Top bar -->
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-logo">
        <svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
      </div>
      <h1>ANCHOR TASKS</h1>
    </div>
    <div class="topbar-right">
      <div class="user-pill" id="user-pill"></div>
      <button class="btn-logout" onclick="logout()">Sign out</button>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab active" data-tab="tasks">Tasks</div>
    <div class="tab" data-tab="board">Board</div>
    <div class="tab" data-tab="projects">Projects</div>
    <div class="tab" data-tab="detail" id="tab-detail" style="display:none">Project Details</div>
  </div>

  <div class="main">

    <!-- ── Tasks section ──────────────────────────────────────── -->
    <div class="section active" id="sec-tasks">
      <div class="stats" id="task-stats"></div>

      <div class="filters" id="task-filters">
        <button class="filter-btn active" data-filter="active">Active</button>
        <button class="filter-btn" data-filter="completed">Completed</button>
        <button class="filter-btn" data-filter="all">All</button>
      </div>

      <div class="card">
        <div class="add-row">
          <input class="inp-title" id="new-task-title" placeholder="New task..." />
          <input class="inp-sm" id="new-task-assignee" placeholder="Assign to..." />
          <input class="inp-sm" id="new-task-due" type="date" />
          <select class="inp-sm" id="new-task-priority">
            <option value="normal">Normal</option>
            <option value="low">Low</option>
            <option value="high">High</option>
            <option value="urgent">Urgent</option>
          </select>
          <select class="inp-sm" id="new-task-project"></select>
          <button class="btn-add" onclick="addTask()">Add</button>
        </div>

        <ul class="task-list" id="task-list"></ul>
      </div>
    </div>

    <!-- ── Board section ─────────────────────────────────────── -->
    <div class="section" id="sec-board">
      <div class="board-toolbar">
        <label>Filter by project:</label>
        <select id="board-project-filter" onchange="renderBoard()">
          <option value="">All Projects</option>
        </select>
      </div>
      <div class="board" id="board-container"></div>
    </div>

    <!-- ── Projects section ───────────────────────────────────── -->
    <div class="section" id="sec-projects">
      <div class="card">
        <div class="add-row">
          <input class="inp-title" id="new-project-name" placeholder="New project name..." />
          <input class="inp-title" id="new-project-desc" placeholder="Description (optional)" />
          <button class="btn-add" onclick="addProject()">Add</button>
        </div>

        <div id="project-list"></div>
      </div>
    </div>

    <!-- ── Project Detail section ─────────────────────────────── -->
    <div class="section" id="sec-detail">
      <button class="detail-back" onclick="closeDetail()">&larr; Back to Projects</button>
      <div id="detail-content"></div>
    </div>

  </div>

  <script src="https://apis.google.com/js/api.js"></script>
  <script src="https://accounts.google.com/gsi/client" async></script>
  <script>
    /* ── State ────────────────────────────────────────────────── */
    let tasks = [];
    let projects = [];
    let user = null;
    let taskFilter = "active";
    let editingTaskId = null;

    /* ── Init ─────────────────────────────────────────────────── */
    async function init() {
      try {
        const res = await fetch("/api/me");
        if (!res.ok) { window.location.href = "/login.html"; return; }
        user = await res.json();
        document.getElementById("user-pill").innerHTML =
          (user.picture ? `<img src="${esc(user.picture)}" alt="" />` : "") +
          `<span>${esc(user.name)}</span>`;
      } catch { window.location.href = "/login.html"; return; }

      // Get Google Client ID for Drive Picker
      try {
        const cfgRes = await fetch("/api/auth-config");
        const cfg = await cfgRes.json();
        googleClientId = cfg.clientId || "";
      } catch {}

      await Promise.all([loadTasks(), loadProjects()]);
      renderAll();
      setupTabs();
      setupFilters();

      // Enter key to add task
      document.getElementById("new-task-title").addEventListener("keydown", e => {
        if (e.key === "Enter") addTask();
      });
      document.getElementById("new-project-name").addEventListener("keydown", e => {
        if (e.key === "Enter") addProject();
      });
    }

    /* ── Data loading ─────────────────────────────────────────── */
    async function loadTasks() {
      const res = await fetch("/api/tasks");
      const data = await res.json();
      tasks = data.tasks || [];
    }

    async function loadProjects() {
      const res = await fetch("/api/projects");
      const data = await res.json();
      projects = data.projects || [];
    }

    /* ── Rendering ────────────────────────────────────────────── */
    function renderAll() {
      renderStats();
      renderTasks();
      renderBoard();
      renderProjects();
      renderProjectDropdown();
      renderBoardProjectFilter();
    }

    function renderStats() {
      const active = tasks.filter(t => !t.done).length;
      const completed = tasks.filter(t => t.done).length;
      const urgent = tasks.filter(t => !t.done && (t.priority === "high" || t.priority === "urgent")).length;
      document.getElementById("task-stats").innerHTML = `
        <div class="stat-card"><div class="stat-label">Active</div><div class="stat-value">${active}</div></div>
        <div class="stat-card"><div class="stat-label">Completed</div><div class="stat-value">${completed}</div></div>
        <div class="stat-card"><div class="stat-label">High Priority</div><div class="stat-value">${urgent}</div></div>
        <div class="stat-card"><div class="stat-label">Projects</div><div class="stat-value">${projects.filter(p=>!p.archived).length}</div></div>
      `;
    }

    function renderTasks() {
      let filtered = tasks;
      if (taskFilter === "active") filtered = tasks.filter(t => !t.done);
      else if (taskFilter === "completed") filtered = tasks.filter(t => t.done);

      const list = document.getElementById("task-list");
      if (!filtered.length) {
        list.innerHTML = `<div class="empty">No ${taskFilter} tasks</div>`;
        return;
      }

      // Sort: urgent > high > normal > low, then by due date
      const priOrder = { urgent: 0, high: 1, normal: 2, low: 3 };
      filtered.sort((a, b) => {
        if (a.done !== b.done) return a.done ? 1 : -1;
        const pa = priOrder[a.priority] ?? 2;
        const pb = priOrder[b.priority] ?? 2;
        if (pa !== pb) return pa - pb;
        if (a.due && b.due) return a.due.localeCompare(b.due);
        if (a.due) return -1;
        if (b.due) return 1;
        return 0;
      });

    /* ── Google Drive Picker ──────────────────────────────────── */
    let pickerApiLoaded = false;
    let driveAccessToken = null;
    let googleClientId = "";

    // Load Picker API
    function loadPickerApi() {
      if (pickerApiLoaded) return Promise.resolve();
      return new Promise((resolve) => {
        gapi.load("picker", () => { pickerApiLoaded = true; resolve(); });
      });
    }

    // Get access token via GIS token client (drive.file = create/manage app-created files)
    function getAccessToken() {
      return new Promise((resolve, reject) => {
        if (driveAccessToken) { resolve(driveAccessToken); return; }
        if (!googleClientId) { reject(new Error("No client ID")); return; }
        const tokenClient = google.accounts.oauth2.initTokenClient({
          client_id: googleClientId,
          scope: "https://www.googleapis.com/auth/drive",
          callback: (resp) => {
            if (resp.error) { reject(new Error(resp.error)); return; }
            driveAccessToken = resp.access_token;
            resolve(driveAccessToken);
          },
        });
        tokenClient.requestAccessToken();
      });
    }

    // Shared Drive ID for Anchor Mortgage project folders
    const SHARED_DRIVE_ID = "0AFFUGkQTfw0uUk9PVA";

    // Create a Google Drive folder for a project (in the Shared Drive)
    async function createDriveFolder() {
      const p = projects.find(p => p.id === activeProjectId);
      if (!p) return;
      try {
        const token = await getAccessToken();
        const resp = await fetch("https://www.googleapis.com/drive/v3/files?supportsAllDrives=true", {
          method: "POST",
          headers: {
            "Authorization": "Bearer " + token,
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            name: p.name,
            mimeType: "application/vnd.google-apps.folder",
            parents: [SHARED_DRIVE_ID],
          }),
        });
        if (!resp.ok) throw new Error("Drive API error: " + resp.status);
        const folder = await resp.json();
        // Save folder ID and URL to project detail
        projectDetail.folderId = folder.id;
        projectDetail.folderUrl = "https://drive.google.com/drive/folders/" + folder.id;
        await fetch(`/api/projects/${activeProjectId}/detail`, {
          method: "PATCH",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ folderId: folder.id, folderUrl: projectDetail.folderUrl }),
        });
        renderDetail();
      } catch (e) {
        console.error("Create folder error:", e);
        alert("Could not create Drive folder. Make sure the Google Drive API is enabled.");
      }
    }

    async function openDrivePicker() {
      try {
        await loadPickerApi();
        const token = await getAccessToken();

        const view = new google.picker.DocsView()
          .setIncludeFolders(true)
          .setSelectFolderEnabled(false);

        // If project has a Drive folder, scope picker to it
        if (projectDetail.folderId) {
          view.setParent(projectDetail.folderId);
        }

        const sharedView = new google.picker.DocsView()
          .setIncludeFolders(true)
          .setEnableDrives(true);

        const picker = new google.picker.PickerBuilder()
          .setOAuthToken(token)
          .addView(view)
          .addView(sharedView)
          .enableFeature(google.picker.Feature.SUPPORT_DRIVES)
          .setCallback(drivePickerCallback)
          .setTitle("Attach a file from Google Drive")
          .build();
        picker.setVisible(true);
      } catch (e) {
        console.error("Drive Picker error:", e);
        alert("Could not open Google Drive picker. Make sure the Picker API is enabled in Google Cloud Console.");
      }
    }

    // Upload a file to the project's Drive folder (from local machine)
    async function uploadToDriveFolder() {
      if (!projectDetail.folderId) {
        alert("Create a Drive folder for this project first.");
        return;
      }
      const input = document.createElement("input");
      input.type = "file";
      input.onchange = async () => {
        const file = input.files[0];
        if (!file) return;
        try {
          const token = await getAccessToken();
          const metadata = {
            name: file.name,
            parents: [projectDetail.folderId],
          };
          const form = new FormData();
          form.append("metadata", new Blob([JSON.stringify(metadata)], { type: "application/json" }));
          form.append("file", file);

          const resp = await fetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,name,webViewLink&supportsAllDrives=true", {
            method: "POST",
            headers: { "Authorization": "Bearer " + token },
            body: form,
          });
          if (!resp.ok) throw new Error("Upload failed: " + resp.status);
          const uploaded = await resp.json();

          // Add to project docs
          await fetch(`/api/projects/${activeProjectId}/docs`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              name: uploaded.name,
              url: uploaded.webViewLink || ("https://drive.google.com/file/d/" + uploaded.id),
              notes: "Uploaded to Drive folder",
            }),
          });
          const res = await fetch(`/api/projects/${activeProjectId}/detail`);
          projectDetail = await res.json();
          renderDetail();
        } catch (e) {
          console.error("Upload error:", e);
          alert("Upload failed: " + e.message);
        }
      };
      input.click();
    }

    async function drivePickerCallback(data) {
      if (data.action !== google.picker.Action.PICKED) return;
      for (const doc of data.docs) {
        await fetch(`/api/projects/${activeProjectId}/docs`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            name: doc.name,
            url: doc.url,
            notes: `Drive: ${doc.mimeType || "file"}`,
          })
        });
      }
      // Reload detail
      const res = await fetch(`/api/projects/${activeProjectId}/detail`);
      projectDetail = await res.json();
      renderDetail();
    }

    async function removeDoc(index) {
      const res = await fetch(`/api/projects/${activeProjectId}/docs`, {
        method: "DELETE",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ index })
      });
      projectDetail = await res.json();
      renderDetail();
    }

    async function addDetailTask() {
      const p = projects.find(p => p.id === activeProjectId);
      if (!p) return;
      const title = document.getElementById("detail-task-title").value.trim();
      if (!title) return;
      const assignee = document.getElementById("detail-task-assignee").value.trim();
      const due = document.getElementById("detail-task-due").value;
      const priority = document.getElementById("detail-task-priority").value;

      await fetch("/api/tasks", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ title, assignee, due, priority, project: p.name })
      });

      await loadTasks();
      renderAll();
      renderDetail();
    }

    /* ── Kanban Board ─────────────────────────────────────────── */
    let boardDragTaskId = null;

    function renderBoardProjectFilter() {
      const sel = document.getElementById("board-project-filter");
      const current = sel.value;
      const active = projects.filter(p => !p.archived);
      sel.innerHTML = `<option value="">All Projects</option>` +
        active.map(p => `<option value="${esc(p.name)}" ${current === p.name ? "selected" : ""}>${esc(p.name)}</option>`).join("") +
        `<option value="__none__" ${current === "__none__" ? "selected" : ""}>No Project</option>`;
    }

    function renderBoard() {
      const filterProject = document.getElementById("board-project-filter").value;

      let filtered = tasks;
      if (filterProject === "__none__") {
        filtered = tasks.filter(t => !t.project);
      } else if (filterProject) {
        filtered = tasks.filter(t => t.project === filterProject);
      }

      // Categorize tasks into 3 columns
      const todo = filtered.filter(t => !t.done && t.status !== "in_progress");
      const inProgress = filtered.filter(t => !t.done && t.status === "in_progress");
      const done = filtered.filter(t => t.done);

      // Sort each column by priority then due date
      const priOrder = { urgent: 0, high: 1, normal: 2, low: 3 };
      const sortFn = (a, b) => {
        const pa = priOrder[a.priority] ?? 2;
        const pb = priOrder[b.priority] ?? 2;
        if (pa !== pb) return pa - pb;
        if (a.due && b.due) return a.due.localeCompare(b.due);
        if (a.due) return -1;
        if (b.due) return 1;
        return 0;
      };
      todo.sort(sortFn);
      inProgress.sort(sortFn);
      done.sort(sortFn);

      function groupByProject(taskList) {
        const groups = {};
        for (const t of taskList) {
          const key = t.project || "No Project";
          if (!groups[key]) groups[key] = [];
          groups[key].push(t);
        }
        return groups;
      }

      function renderCard(t) {
        const priBorder = t.priority !== "normal" ? ` pri-border-${t.priority}` : "";
        return `
          <div class="board-card${priBorder}" draggable="true"
               data-task-id="${t.id}"
               ondragstart="boardDragStart(event, '${t.id}')"
               ondragend="boardDragEnd(event)">
            <div class="board-card-title">${esc(t.title)}</div>
            <div class="board-card-tags">
              ${t.priority && t.priority !== "normal" ? `<span class="board-card-tag pri-${t.priority}">${t.priority}</span>` : ""}
              ${t.assignee ? `<span class="board-card-tag assignee">${esc(t.assignee)}</span>` : ""}
              ${t.due ? `<span class="board-card-tag due">${t.due}</span>` : ""}
            </div>
          </div>`;
      }

      function renderColumn(taskList, colClass) {
        if (!taskList.length) return `<div class="board-empty">No tasks</div>`;
        const groups = groupByProject(taskList);
        const keys = Object.keys(groups).sort();
        return keys.map(key => `
          <div class="board-swimlane">
            ${keys.length > 1 || key !== "No Project" ? `<div class="board-swimlane-title">${esc(key)}</div>` : ""}
            ${groups[key].map(renderCard).join("")}
          </div>
        `).join("");
      }

      document.getElementById("board-container").innerHTML = `
        <div class="board-column board-col-todo"
             ondragover="boardDragOver(event)" ondragleave="boardDragLeave(event)"
             ondrop="boardDrop(event, 'todo')">
          <div class="board-column-header">
            <span class="board-column-title">To Do</span>
            <span class="board-column-count">${todo.length}</span>
          </div>
          <div class="board-drop-zone">
            ${renderColumn(todo, "todo")}
          </div>
        </div>
        <div class="board-column board-col-inprogress"
             ondragover="boardDragOver(event)" ondragleave="boardDragLeave(event)"
             ondrop="boardDrop(event, 'in_progress')">
          <div class="board-column-header">
            <span class="board-column-title">In Progress</span>
            <span class="board-column-count">${inProgress.length}</span>
          </div>
          <div class="board-drop-zone">
            ${renderColumn(inProgress, "inprogress")}
          </div>
        </div>
        <div class="board-column board-col-done"
             ondragover="boardDragOver(event)" ondragleave="boardDragLeave(event)"
             ondrop="boardDrop(event, 'done')">
          <div class="board-column-header">
            <span class="board-column-title">Done</span>
            <span class="board-column-count">${done.length}</span>
          </div>
          <div class="board-drop-zone">
            ${renderColumn(done, "done")}
          </div>
        </div>
      `;
    }

    function boardDragStart(e, taskId) {
      boardDragTaskId = taskId;
      e.dataTransfer.effectAllowed = "move";
      e.dataTransfer.setData("text/plain", taskId);
      // Add dragging class after a tick so the browser captures the element first
      setTimeout(() => {
        const el = document.querySelector(`.board-card[data-task-id="${taskId}"]`);
        if (el) el.classList.add("dragging");
      }, 0);
    }

    function boardDragEnd(e) {
      document.querySelectorAll(".board-card.dragging").forEach(el => el.classList.remove("dragging"));
      document.querySelectorAll(".board-drop-zone.drag-active").forEach(el => el.classList.remove("drag-active"));
      boardDragTaskId = null;
    }

    function boardDragOver(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = "move";
      const zone = e.currentTarget.querySelector(".board-drop-zone");
      if (zone) zone.classList.add("drag-active");
    }

    function boardDragLeave(e) {
      const zone = e.currentTarget.querySelector(".board-drop-zone");
      if (zone) zone.classList.remove("drag-active");
    }

    async function boardDrop(e, column) {
      e.preventDefault();
      const taskId = e.dataTransfer.getData("text/plain") || boardDragTaskId;
      if (!taskId) return;

      document.querySelectorAll(".board-drop-zone.drag-active").forEach(el => el.classList.remove("drag-active"));

      let patchData = {};
      if (column === "done") {
        patchData = { done: true, status: "" };
      } else if (column === "in_progress") {
        patchData = { done: false, status: "in_progress" };
      } else {
        // todo
        patchData = { done: false, status: "" };
      }

      await fetch(`/api/tasks/${taskId}`, {
        method: "PATCH",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(patchData)
      });

      await loadTasks();
      renderAll();
    }

    async function logout() {
      await fetch("/api/logout", { method: "POST" });
      window.location.href = "/login.html";
    }

    /* ── Tabs ─────────────────────────────────────────────────── */
    function setupTabs() {
      document.querySelectorAll(".tab").forEach(tab => {
        tab.addEventListener("click", () => {
          document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
          document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
          tab.classList.add("active");
          document.getElementById(`sec-${tab.dataset.tab}`).classList.add("active");
        });
      });
    }

    /* ── Filters ──────────────────────────────────────────────── */
    function setupFilters() {
      document.querySelectorAll("#task-filters .filter-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          document.querySelectorAll("#task-filters .filter-btn").forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
          taskFilter = btn.dataset.filter;
          renderTasks();
        });
      });
    }

    /* ── Util ─────────────────────────────────────────────────── */
    function esc(s) {
      const d = document.createElement("div");
      d.textContent = s || "";
      return d.innerHTML;
    }

    init();
  </script>
</body>
